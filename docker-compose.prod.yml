version: '3.8'

services:
  backend:
    image: ghcr.io/pedroprobolsas/academia-trading-backend:latest
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_HOST=postgres_postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - JWT_SECRET=${JWT_SECRET}
      - MINIO_ENDPOINT=ippminioback.probolsas.co
      - MINIO_PORT=443
      - MINIO_USE_SSL=true
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - CORS_ORIGIN=https://academia.pedrosandoval.com.co
    networks:
      - probolsas
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  frontend:
    image: ghcr.io/pedroprobolsas/academia-trading-frontend:latest
    networks:
      - probolsas
    deploy:
      replicas: 1
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.academia-trading.rule=Host(`academia.pedrosandoval.com.co`)"
        - "traefik.http.routers.academia-trading.entrypoints=websecure"
        - "traefik.http.routers.academia-trading.tls.certresolver=letsencrypt"
        - "traefik.http.services.academia-trading.loadbalancer.server.port=80"
      restart_policy:
        condition: on-failure

networks:
  probolsas:
    external: true
